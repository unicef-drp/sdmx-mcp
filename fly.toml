# fly.toml app configuration file generated for sdmx-mcp on 2025-12-14T20:57:09+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'sdmx-mcp'
primary_region = 'fra'

[build]

[deploy]
  [deploy.release_command_vm]
    memory = '2048mb'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  memory = '4096mb'
  cpu_kind = 'shared'
  cpus = 2
  memory_mb = 4096
