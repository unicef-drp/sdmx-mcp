# Manual Fly deploy template for downstream branches.
# Generic main intentionally does not auto-deploy on push.

name: Fly Deploy
on:
  workflow_dispatch:
    inputs:
      config:
        description: "Fly config file to deploy"
        required: false
        default: "fly.toml"

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    concurrency: fly-deploy-${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy app
        run: flyctl deploy --remote-only --config "${{ inputs.config }}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
