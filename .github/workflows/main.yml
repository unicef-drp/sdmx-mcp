name: gitleaks

on:
  pull_request:
  push:
    branches: [main, dev]

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          curl -sSfL https://raw.githubusercontent.com/gitleaks/gitleaks/master/install.sh \
            | sh -s -- -b /usr/local/bin
      - name: Run gitleaks
        run: gitleaks detect --source . --verbose
