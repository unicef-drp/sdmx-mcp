# fly.toml app configuration file generated for sdmx-mcp-eval on 2026-03-27T15:30:11+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'sdmx-mcp-eval'
primary_region = 'fra'

[build]

[deploy]
  [deploy.release_command_vm]
    memory = '2048mb'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '2048mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 2048
